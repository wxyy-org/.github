name: Create GitHub Release
description: 在指定仓库创建 GitHub Release

inputs:
  tag:
    description: "tag 名称"
    required: true
  name:
    description: "Release 名称"
    required: true
  body:
    description: "Release body（Markdown）"
    required: true
  repository:
    description: "目标仓库（owner/repo）"
    required: true
  token:
    description: "GitHub token"
    required: true

runs:
  using: composite
  steps:
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ inputs.token }}
        repository: ${{ inputs.repository }}
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.name }}
        body: ${{ inputs.body }}
