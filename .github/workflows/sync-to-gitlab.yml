name: Sync GitHub → GitLab (via HTTPS)

on:
  workflow_call:
    inputs:
      gitlab_host:
        description: "GitLab 实例地址"
        type: string
        default: "https://gitlab.realwxyy.com"
      gitlab_repo:
        description: "GitLab 上的 group/repo（不含 .git）"
        type: string
        required: true
    secrets:
      GITLAB_TOKEN:
        description: "GitLab OAuth2 Token"
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check GitLab health
        id: gitlab_up
        uses: wxyy-org/.github/actions/gitlab-health-check@main
        with:
          gitlab_host: ${{ inputs.gitlab_host }}

      - name: Mirror to GitLab
        if: steps.gitlab_up.outputs.reachable == 'true'
        uses: wxyy-org/.github/actions/gitlab-mirror@main
        with:
          gitlab_host: ${{ inputs.gitlab_host }}
          gitlab_repo: ${{ inputs.gitlab_repo }}
          gitlab_token: ${{ secrets.GITLAB_TOKEN }}

      - name: Sync skipped (GitLab offline)
        if: steps.gitlab_up.outputs.reachable != 'true'
        run: echo "No changes pushed — GitLab was unreachable."
